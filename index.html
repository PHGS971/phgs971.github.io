<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meu Site com Botões</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h1 {
      margin-bottom: 40px;
      font-size: 2.5rem;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .btn {
      background-color: #ffffff20;
      border: 2px solid #fff;
      padding: 15px 30px;
      border-radius: 12px;
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      font-size: 1.2rem;
      text-align: center;
      transition: 0.3s ease;
    }

    .btn:hover {
      background-color: #fff;
      color: #1e3c72;
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>

  <h1>Bem-vindo ao Meu Site de teste</h1>
  
  <div class="button-container">
    <a class="btn" href="https://www.google.com" target="_blank">Ir para o Google</a>
    <a class="btn" href="https://www.youtube.com" target="_blank">Ir para o YouTube</a>
    <a class="btn" href="https://chat.openai.com" target="_blank">Ir para o ChatGPT</a>
  </div>

</body>
</html>
